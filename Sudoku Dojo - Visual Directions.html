<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sudoku Dojo — Visual Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;500;600;700;900&family=Shippori+Mincho:wght@400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@300;400;500;600;700;900&family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles/zen.css" />
<link rel="stylesheet" href="styles/glass.css" />
<link rel="stylesheet" href="styles/pixel.css" />
<style>
  html, body { margin: 0; height: 100%; background: #f0eee9; }
  #root { height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="screens/data.jsx"></script>
<script type="text/babel" src="screens/zen.jsx"></script>
<script type="text/babel" src="screens/glass.jsx"></script>
<script type="text/babel" src="screens/pixel.jsx"></script>

<script type="text/babel">
const W = 1180, H = 768;

function App() {
  return (
    <DesignCanvas>
      <DCSection id="game" title="Screen 1 · Game"
        subtitle="9×9 grid · center cell selected with row/col/box peers · timer + puzzle Elo · number pad & tools">
        <DCArtboard id="g-zen"   label="A · Zen Ink"      width={W} height={H}><GameZen /></DCArtboard>
        <DCArtboard id="g-glass" label="B · Liquid Glass" width={W} height={H}><GameGlass /></DCArtboard>
        <DCArtboard id="g-pixel" label="C · Pixel Dojo"   width={W} height={H}><GamePixel /></DCArtboard>
      </DCSection>

      <DCSection id="rank" title="Screen 2 · Choose Your Path"
        subtitle="Rank selection (onboarding step 2) · four belt cards tied to Elo seeds · Kuro-obi selected">
        <DCArtboard id="r-zen"   label="A · Zen Ink"      width={W} height={H}><RankZen /></DCArtboard>
        <DCArtboard id="r-glass" label="B · Liquid Glass" width={W} height={H}><RankGlass /></DCArtboard>
        <DCArtboard id="r-pixel" label="C · Pixel Dojo"   width={W} height={H}><RankPixel /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
